            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            scene.add(new THREE.AmbientLight(0x444444));
            const sun = new THREE.PointLight(0xffffff, 3, 1000);
            sun.position.set(50, 50, 50);
            scene.add(sun);

            createParticleLayer('cube', 90, 3500, 0xffffff, 0.0005, 0.4); 
            createParticleLayer('sphere', 260, 1600, 0x9370DB, 0.0003, 1.5); 
            createParticleLayer('rhombus', 1040, 2600, 0xffffff, 0.0002, 1.5); 

            const chawpi = new THREE.Mesh(new THREE.IcosahedronGeometry(3, 1), new THREE.MeshPhongMaterial({color: 0x00f3ff, wireframe: true}));
            scene.add(chawpi);

            const list = document.getElementById('skin-list');
            SKINS.forEach((skin, i) => {
                const angle = (i / 18) * Math.PI * 2;
                const r = 40; 
                const nodeGroup = new THREE.Group();
                const mesh = new THREE.Mesh(
                    new THREE.OctahedronGeometry(1.5, 0),
                    new THREE.MeshPhongMaterial({ color: skin.color, emissive: skin.color, emissiveIntensity: 0.6, flatShading: true })
                );
                nodeGroup.add(mesh);
                targetableObjects.push(mesh); 

                const nodePos = new THREE.Vector3(Math.cos(angle)*r, (Math.random()-0.5)*15, Math.sin(angle)*r);
                const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), nodePos]);
                const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({color: 0x444444, transparent: true, opacity: 0.45}));
                scene.add(line);

                const div = document.createElement('div');
                div.className = 'label-3d';
                div.textContent = skin.name.split(' ')[0];
                div.onclick = () => focusSkin(i);
                const label = new THREE.CSS2DObject(div);
                label.position.set(0, 4, 0); 
                nodeGroup.add(label);

                nodeGroup.position.copy(nodePos);
                scene.add(nodeGroup);
                nodes.push({ group: nodeGroup, mesh: mesh, data: skin, line: line, labelDiv: div });

                const item = document.createElement('div');
                item.className = 'skin-item';
                item.innerHTML = `<span style="color:${skin.color}">â </span> ${skin.name}`;
                item.onclick = () => focusSkin(i);
                list.appendChild(item);
            });

            window.addEventListener('resize', onResize);
            renderer.domElement.addEventListener('click', onI3DClick);
            renderer.domElement.addEventListener('touchstart', onI3DClick);

            setTimeout(() => {
                gsap.to("#preloader", { opacity: 0, duration: 1.5, onComplete: () => document.getElementById("preloader").style.display = "none" });
            }, 2500);

            setTimeout(() => {
                try {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
                    }
                } catch(e) {}
            }, 1000);

            animate();
        }

        function createParticleLayer(type, size, count, color, rotSpeed, pointSize = 1.5) {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<count; i++) {
                let x, y, z;
                if(type === 'cube') {
                    x = (Math.random()-0.5)*size*2; y = (Math.random()-0.5)*size*2; z = (Math.random()-0.5)*size*2;
                } else if(type === 'sphere') {
                    const u = Math.random(); const v = Math.random();
                    const theta = 2 * Math.PI * u; const phi = Math.acos(2 * v - 1);
                    x = size * Math.sin(phi) * Math.cos(theta); y = size * Math.sin(phi) * Math.sin(theta); z = size * Math.cos(phi);
                } else {
                    const u = Math.random()*2-1; const v = Math.random()*2-1; const w = Math.random()*2-1;
                    const norm = Math.abs(u) + Math.abs(v) + Math.abs(w);
                    x = (u/norm)*size; y = (v/norm)*size; z = (w/norm)*size;
                }
                pos.push(x, y, z);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const points = new THREE.Points(geo, new THREE.PointsMaterial({color: color, size: pointSize, transparent: true, opacity: 0.7}));
            const group = new THREE.Group();
            group.add(points);
            group.userData.rotSpeed = rotSpeed;
            scene.add(group);
            activeLayerGroups.push(group);
        }

        function onI3DClick(event) {
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(targetableObjects);
            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                const index = nodes.findIndex(n => n.mesh === clickedMesh);
                if (index !== -1) focusSkin(index);
            }
        }

        function navigateSkins(step) {
            let nextIndex = currentSkinIndex + step;
            if (nextIndex >= SKINS.length) nextIndex = 0;
            if (nextIndex < 0) nextIndex = SKINS.length - 1;
            focusSkin(nextIndex);
        }

        // Lector de Aura (RNG)
        function leerAura() {
            const randomIndex = Math.floor(Math.random() * SKINS.length);
            focusSkin(randomIndex);
        }

        // MOTOR DUAL CON DESBLOQUEO SILENCIOSO (SILENT UNLOCKER) PARA APK AUTOPLAY POLICY
        function toggleSpeech() {
            if (currentSkinIndex === -1) return;
            const btn = document.getElementById('tts-btn');

            if (window.currentAudio && !window.currentAudio.paused) {
                window.currentAudio.pause();
                window.currentAudio = null;
                btn.innerHTML = '&#9658; INICIAR REPRODUCCIÃN';
                return;
            }
            try {
                if ('speechSynthesis' in window && window.speechSynthesis.speaking) {
                    window.speechSynthesis.cancel();
                    btn.innerHTML = '&#9658; INICIAR REPRODUCCIÃN';
                    return;
                }
            } catch(e) {}

            btn.innerHTML = '&#9632; DETENER REPRODUCCIÃN';
            const skin = SKINS[currentSkinIndex];
            const rawText = `Secuencia de activaciÃģn para ${skin.name}. Cultura base: ${skin.culture}. Habilidad principal: ${skin.skill}. Punto de enfoque fÃ­sico: ${skin.hardware}. AnÃĄlisis tÃĄctico: ${skin.analysis}. InstrucciÃģn de Booteo: ${skin.boot}. Mantra de ejecuciÃģn: ${skin.mantra}.`;

            let nativeSupported = false;
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.getVoices().length > 0) nativeSupported = true;
            }

            if (nativeSupported) {
                try {
                    window.currentUtterance = new SpeechSynthesisUtterance(rawText);
                    window.currentUtterance.lang = 'es-ES';
                    window.currentUtterance.rate = 0.85; 
                    window.currentUtterance.pitch = 0.6; 

                    const voices = window.speechSynthesis.getVoices();
                    const esVoices = voices.filter(v => v.lang.startsWith('es'));
                    const preferredVoice = esVoices.find(v => v.name.toLowerCase().includes('male') || v.name.includes('Google')) || esVoices[0] || voices[0];
                    if (preferredVoice) window.currentUtterance.voice = preferredVoice;
                    
                    window.currentUtterance.onend = () => { btn.innerHTML = '&#9658; INICIAR REPRODUCCIÃN'; };
                    window.currentUtterance.onerror = () => { btn.innerHTML = '&#9658; INICIAR REPRODUCCIÃN'; };
                    
                    window.speechSynthesis.speak(window.currentUtterance);
                } catch(e) { console.error("Fallo Nativo:", e); }
            } else {
                
                const cleanText = rawText.replace(/[\n\r]/g, ' ').replace(/\s{2,}/g, ' ');
                const chunks = cleanText.match(/[^.!?]+[.!?]+|\s*[^.!?]+$/g).filter(s => s.trim().length > 0);
                let chunkIndex = 0;
                
                window.currentAudio = new Audio();
                
                // SILENT UNLOCKER: Fuerza un archivo Base64 vacÃ­o en el hilo sincrÃģnico para romper el bloqueo de Autoplay de Android
                window.currentAudio.src = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
                window.currentAudio.play().catch(e => { console.warn("Unlocker block", e); });
                
                window.currentAudio.playbackRate = 0.75; 

                const playNextChunk = () => {
                    if (chunkIndex >= chunks.length) {
                        btn.innerHTML = '&#9658; INICIAR REPRODUCCIÃN';
                        window.currentAudio = null;
                        return;
                    }
                    
                    const payload = encodeURIComponent(chunks[chunkIndex].trim());
                    const url = `https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=es-US&q=${payload}`;
                    
                    window.currentAudio.src = url;
                    window.currentAudio.play().catch(e => {
                        console.error("Audio Fallback Blocked:", e);
                        // Fallback Final si Google falla: Youdao Dictionary API (Menos restrictiva)
                        const urlBackup = `https://dict.youdao.com/dictvoice?audio=${payload}&le=es`;
                        window.currentAudio.src = urlBackup;
                        window.currentAudio.play().catch(err => {
                            btn.innerHTML = '>[ERROR] SISTEMA RESTRINGIDO';
                        });
                    });
                    
                    window.currentAudio.onended = () => {
                        chunkIndex++;
                        playNextChunk();
                    };
                };
                
                // Ejecutamos el primer chunk tras una fracciÃģn de segundo para asegurar que el Unlocker hizo efecto
                setTimeout(playNextChunk, 50);
            }
        }

        function focusSkin(index) {
            isAutoRotating = false;
            currentSkinIndex = index;
            const target = nodes[index];
            const isMobile = window.innerWidth < 1200; // ACTUALIZADO A TABLET MÃXIMA RESOLUCIÃN

            if(isMobile) document.getElementById('sidebar').classList.remove('active');

            setTimeout(() => {
                try {
                    if (window.currentAudio && !window.currentAudio.paused) {
                        window.currentAudio.pause();
                        window.currentAudio = null;
                    }
                    if ('speechSynthesis' in window && window.speechSynthesis.speaking) {
                        window.speechSynthesis.cancel();
                    }
                    const btn = document.getElementById('tts-btn');
                    if (btn) btn.innerHTML = '&#9658; INICIAR REPRODUCCIÃN';
                } catch(e) {}
            }, 10);

            nodes.forEach((n, i) => {
                const isTarget = (i === index);
                n.group.visible = isTarget; 
                if(n.line) n.line.visible = isTarget; 
                if(n.labelDiv) {
                    n.labelDiv.style.opacity = isTarget ? '1' : '0';
                    n.labelDiv.style.pointerEvents = isTarget ? 'auto' : 'none';
                }
            });

            const targetWorldPos = new THREE.Vector3();
            target.group.getWorldPosition(targetWorldPos);
            
            gsap.to(controls.target, { x: targetWorldPos.x, y: targetWorldPos.y, z: targetWorldPos.z, duration: 1.5, ease: "power2.inOut", onUpdate: () => controls.update() });
            
            const offsetDist = isMobile ? 18 : 12; 
            const direction = targetWorldPos.clone().normalize(); 
            const cameraPos = targetWorldPos.clone().add(direction.multiplyScalar(offsetDist));
            cameraPos.y += 2; 

            gsap.to(camera.position, { x: cameraPos.x, y: cameraPos.y, z: cameraPos.z, duration: 1.5, ease: "power2.inOut" });

            document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.skin-item')[index].classList.add('active');
            
            document.getElementById('node-name').innerText = target.data.name;
            document.getElementById('node-culture').innerText = target.data.culture;
            document.getElementById('node-skill').innerText = target.data.skill;
            
            const descHtml = `
                <div style="margin-bottom: 10px;"><span style="color: var(--neon-orange); font-size: 9px;">>_HARDWARE_TARGET:</span> <span style="color: #fff;">${target.data.hardware}</span></div>
                <div style="margin-bottom: 10px;"><span style="color: var(--neon-orange); font-size: 9px;">>_ANÃLISIS:</span> <span style="color: #ccc;">${target.data.analysis}</span></div>
                <div style="margin-bottom: 10px;"><span style="color: var(--neon-orange); font-size: 9px;">>_BOOT_SEQ:</span> <span style="color: #ccc;">${target.data.boot}</span></div>
                <div style="margin-top: 15px; padding-left: 10px; border-left: 2px solid var(--neon-blue); font-style: italic; color: #00f3ff;">"${target.data.mantra}"</div>
            `;
            document.getElementById('node-desc').innerHTML = descHtml;
            document.getElementById('detail-panel').classList.add('visible');
        }

        function resetView() {
            setTimeout(() => {
                try {
                    if (window.currentAudio && !window.currentAudio.paused) {
                        window.currentAudio.pause();
                        window.currentAudio = null;
                    }
                    if ('speechSynthesis' in window && window.speechSynthesis.speaking) {
                        window.speechSynthesis.cancel();
                    }
                    const btn = document.getElementById('tts-btn');
                    if (btn) btn.innerHTML = '&#9658; INICIAR REPRODUCCIÃN';
                } catch(e) {}
            }, 10);

            isAutoRotating = true;
            currentSkinIndex = -1;
            document.getElementById('detail-panel').classList.remove('visible');
            document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
            
            nodes.forEach(n => {
                n.group.visible = true;
                if (n.line) n.line.visible = true;
                if (n.labelDiv) { n.labelDiv.style.opacity = '1'; n.labelDiv.style.pointerEvents = 'auto'; }
            });

            gsap.to(controls.target, { x: 0, y: 0, z: 0, duration: 1.5 });
            gsap.to(camera.position, { x: 0, y: 40, z: 120, duration: 1.5 });
        }

        function toggleIndex() {
            const s = document.getElementById('sidebar');
            const isMobile = window.innerWidth < 1200; // ACTUALIZADO A TABLET MÃXIMA RESOLUCIÃN
            isMobile ? s.classList.toggle('active') : s.classList.toggle('hidden');
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            if(isAutoRotating) scene.rotation.y += 0.0003;
            activeLayerGroups.forEach((group, i) => {
                group.rotation.y += group.userData.rotSpeed;
                group.rotation.x = Math.sin(time * 0.05 + i) * 0.03; 
            });
            nodes.forEach(n => n.group.children[0].rotation.y += 0.004);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
