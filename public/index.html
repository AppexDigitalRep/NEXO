<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXO 1.18 - VISIÓN ÍNTEGRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #7000ff;
            --neon-orange: #FF8C00;
            --glass: rgba(5, 5, 10, 0.95);
            --border: 1px solid rgba(0, 243, 255, 0.3);
        }

        * { box-sizing: border-box; }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: 'Fira Code', monospace; overflow: hidden; touch-action: none; }

        /* PANTALLA DE CARGA INICIAL (PRELOADER) */
        #preloader {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background-color: #000;
            background-image: url('imagenes/fondo.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out;
        }

        /* INTERFAZ UI */
        #ui-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: space-between;
            pointer-events: none; z-index: 100;
        }

        .sidebar, .detail-panel {
            pointer-events: auto; 
            background: linear-gradient(135deg, rgba(5,5,10,0.95) 40%, rgba(20,10,25,0.90) 100%);
            backdrop-filter: blur(12px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; z-index: 110;
            box-shadow: inset 0 0 25px rgba(112, 0, 255, 0.15), 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .sidebar { width: 220px; padding: 15px; overflow-y: auto; }
        .sidebar.hidden { transform: translateX(-100%); }
        
        #skin-list {
            border-left: 1px solid rgba(46, 139, 87, 0.4); 
            border-right: 1px solid rgba(135, 206, 235, 0.4);
            padding: 0 10px;
        }

        .detail-panel { 
            width: 320px; 
            padding: 25px; 
            transform: translateX(100%); 
            z-index: 120;
            overflow-y: auto;
            border-bottom: 2px solid rgba(255, 69, 0, 0.5); 
            border-top: 2px solid rgba(0, 191, 255, 0.5); 
            border-left: 1px solid rgba(112, 0, 255, 0.3);
        }
        .detail-panel.visible { transform: translateX(0); }

        .mobile-nav {
            display: none;
            position: absolute;
            bottom: 85px; 
            top: auto;
            left: 0;
            width: 100%;
            transform: none;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 145;
        }
        .nav-arrow {
            pointer-events: auto;
            color: var(--neon-blue);
            font-size: 35px;
            cursor: pointer;
            text-shadow: 0 0 15px var(--neon-blue), 0 0 5px #000;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0, 243, 255, 0.4);
            transition: all 0.2s ease;
        }
        .nav-arrow:active { transform: scale(0.9); background: rgba(0, 243, 255, 0.2); }

        /* Reproductor TTS Botón */
        #tts-btn {
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 8px;
            text-align: center;
            font-family: 'Orbitron';
            font-size: 9px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }
        #tts-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }

        @media (max-width: 768px) {
            #preloader {
                background-position: center center; 
            }

            .sidebar { width: 100%; position: absolute; height: 100%; transform: translateX(-100%); z-index: 150;}
            .sidebar.active { transform: translateX(0); }
            
            .detail-panel { 
                width: 100%; position: absolute; height: 100%; z-index: 130;
                background: transparent;
                backdrop-filter: none;
                border: none;
                box-shadow: none;
                padding-bottom: 140px; 
            }
            
            .mobile-nav { display: flex; }

            /* Blindaje de texto oscuro sobre 3D con Sombras Extremas */
            .detail-panel h1, .detail-panel p, .detail-panel label, .detail-panel .close-btn, .detail-panel span, .detail-panel div {
                text-shadow: 2px 2px 4px #000, -2px -2px 4px #000, 0px 0px 10px #000, 0px 0px 15px rgba(0,0,0,0.8) !important;
            }

            .controls { z-index: 140; }
        }

        .controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; pointer-events: auto; z-index: 130;
        }

        .btn {
            background: rgba(0, 243, 255, 0.05); border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 12px 20px; cursor: pointer;
            font-family: 'Orbitron'; font-size: 10px; text-transform: uppercase; border-radius: 5px;
            transition: all 0.2s ease;
        }
        .btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        .skin-item { padding: 10px; margin: 3px 0; cursor: pointer; font-size: 11px; color: #aaa; border-left: 2px solid transparent; transition: all 0.2s ease;}
        .skin-item:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .skin-item.active { border-left-color: var(--neon-blue); background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); }

        .label-3d {
            color: #fff; font-family: 'Orbitron'; font-size: 10px;
            background: rgba(0,0,0,0.8); padding: 3px 7px; border: 1px solid var(--neon-blue);
            white-space: nowrap; text-shadow: 0 0 5px var(--neon-blue);
            cursor: pointer; pointer-events: auto;
            transition: opacity 0.3s ease;
        }
        .label-3d:hover {
            background: rgba(0, 243, 255, 0.2); box-shadow: 0 0 10px var(--neon-blue);
        }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .close-btn { align-self: flex-end; color: var(--neon-blue); cursor: pointer; font-size: 12px; margin-bottom: 15px; font-weight: bold;}
        .close-btn:hover { text-shadow: 0 0 8px var(--neon-blue); }
    </style>
</head>
<body>

    <div id="preloader"></div>

    <div id="ui-wrapper">
        <div id="sidebar" class="sidebar">
            <div class="close-btn" onclick="toggleIndex()">[X] CERRAR</div>
            <h2 style="font-size: 16px; color: var(--neon-blue); font-family: 'Orbitron'; margin: 0 0 20px 0;">MASTER_INDEX</h2>
            <div id="skin-list"></div>
        </div>

        <div id="detail-panel" class="detail-panel">
            <div class="close-btn" onclick="resetView()">[X] LIBERAR_FOCO</div>
            
            <div class="mobile-nav">
                <div class="nav-arrow" onclick="navigateSkins(-1)">&#10094;</div>
                <div class="nav-arrow" onclick="navigateSkins(1)">&#10095;</div>
            </div>

            <div style="display: flex; flex-direction: column; flex-grow: 1; height: 100%;">
                <div>
                    <h1 id="node-name" style="font-size: 20px; font-family: 'Orbitron'; margin: 0; color: var(--neon-blue);">NAME</h1>
                    <p id="node-culture" style="color: var(--neon-purple); font-size: 11px; margin: 0 0 10px 0;">CULTURA</p>
                    <div id="tts-btn" onclick="toggleSpeech()">&#9658; INICIAR REPRODUCCIÓN</div>
                </div>
                
                <div style="margin-top: auto; padding-bottom: 20px;">
                    <label style="color: var(--neon-blue); font-size: 9px; letter-spacing: 1px;">MODO_ACTIVO</label>
                    <p id="node-skill" style="font-size: 13px; margin: 5px 0 15px 0; color: #fff;"></p>
                    
                    <div id="node-desc" style="font-size: 11px; color: #ccc; line-height: 1.5; margin: 5px 0 0 0;"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="toggleIndex()">Índice</button>
            <button class="btn" onclick="resetView()">VISTA_GLOBAL</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // BASE DE DATOS INYECTADA V2.0
        const SKINS = [
            { name: "ÁGUILA (TZ'IKIN)", culture: "Maya", skill: "Visión Panorámica y Orquestación de Vida.", color: "#FFD700", hardware: "Coronilla / Plano superior de la cabeza.", analysis: "El intermediario entre el cielo y la tierra. Te permite elevarte sobre el caos del día a día para ver el mapa completo de tu existencia: tus empresas, tus relaciones y tu propósito. Conecta con el Hanan Pacha para identificar la abundancia y los recursos antes de dar el primer paso en cualquier proyecto.", boot: "Cierra los ojos. Visualiza un rayo de luz dorada entrando por tu coronilla. Siente cómo tu perspectiva se aleja rápidamente de tu cuerpo físico hasta ver tu vida entera, tus caminos y opciones como un mapa brillante desde las alturas.", mantra: "Me elevo sobre la densidad. Veo la red completa de mi vida y el flujo perfecto de mis creaciones." },
            { name: "CERDO DE MADERA", culture: "China", skill: "Generador de Ayni y Abundancia Orgánica.", color: "#8B4513", hardware: "Pecho / Corazón.", analysis: "La madera representa el crecimiento natural. Es la energía del disfrute, la honestidad radical y la generosidad. Asegura que tus negocios prosperen con fluidez y que tus lazos se mantengan profundamente nutridos.", boot: "Respira profundo expandiendo el pecho. Visualiza raíces de luz verde esmeralda expandiéndose desde tu corazón, abrazando a las personas que amas y los proyectos que cultivas.", mantra: "Fluyo en la abundancia del Ayni. Soy tierra fértil; nutro a los míos y lo que toco prospera." },
            { name: "CANGREJO (CÁNCER)", culture: "Zodiaco", skill: "Escudo Energético y Santuario Interno.", color: "#FF4500", hardware: "Caparazón externo / Toda la espalda.", analysis: "Guardián de las aguas y del hogar. Tu espacio personal es sagrado. Esta armadura protege tu núcleo sensible y creativo de las influencias externas y las energías densas, permitiéndote ser vulnerable solo donde tú decides.", boot: "Endereza la columna. Siente cómo un escudo de luz naranja vibrante se cristaliza alrededor de tus hombros y espalda. Reafirma que tu hogar y tu paz interior son fortalezas impenetrables.", mantra: "Mi núcleo es intocable. Mi hogar y mi paz están absoluta y eternamente asegurados." },
            { name: "PÁJARO CARPINTERO", culture: "Nativa Americana", skill: "Persistencia Rítmica y Materialización.", color: "#FF0000", hardware: "Nariz / Eje frontal de la cara.", analysis: "El constructor incansable de la materia. Otorga la disciplina para materializar grandes visiones paso a paso, ya sea estructurando una nueva empresa, construyendo un objeto físico o dando forma a la realidad en el mundo denso.", boot: "Enfoca tu atención en el entrecejo y la nariz. Escucha mentalmente un pulso constante, como el latido de la tierra. Sincroniza la velocidad de tu pensamiento con el movimiento creador de tus manos.", mantra: "Ritmo perfecto. Persistencia inquebrantable. Golpe a golpe, materializo mi visión." },
            { name: "GATO", culture: "Celta", skill: "Sensor de Frecuencias e Intuición Silenciosa.", color: "#00FF7F", hardware: "Visión periférica / Ojos.", analysis: "El maestro de lo invisible. Te permite caminar descalzo por la vida sintiendo el terreno real. Detecta intenciones ocultas, mentiras o energías estancadas en entornos sociales complejos, permitiéndote moverte con elegancia sin absorber densidad.", boot: "Relaja la mirada dejándola 'fuera de foco'. Visualiza tus pupilas dilatándose, escaneando los matices sutiles de tu entorno, leyendo el ambiente y a las personas desde el silencio total.", mantra: "Percibo lo oculto. Camino entre las sombras y las energías densas sin dejar rastro ni absorberlas." },
            { name: "ANUBIS (CHACAL)", culture: "Egipcia", skill: "Guía de Transiciones y Portales.", color: "#C0C0C0", hardware: "Plano superior externo / Observador detrás de ti.", analysis: "El guardián de los umbrales. Es tu ancla cuando cruzas de un estado a otro: de la vigilia al mundo de los sueños, de la planificación física a la ejecución digital, o al navegar cambios radicales en tu estilo de vida.", boot: "Siente una presencia silenciosa, alta y firme justo detrás de tus hombros. Respira hondo y visualiza un portal abriéndose frente a ti. Cruza el umbral con total intención y conciencia.", mantra: "Soy el soberano de mis transiciones. El portal se abre y cruzo con total dominio." },
            { name: "SERPIENTE (ASHLESHA)", culture: "Védica", skill: "Lógica Profunda y Regeneración Física.", color: "#32CD32", hardware: "Médula espinal / Columna vertebral.", analysis: "La Kundalini, dueña de la energía vital. Domina la capacidad de mudar la piel y sanar la estructura ósea y corporal. Te conecta con el conocimiento terrenal más antiguo y la capacidad de entender sistemas complejos desde su raíz.", boot: "Siente el calor en la base de tu columna. Visualiza una luz verde neón subiendo en espiral, vértebra por vértebra, regenerando tu cuerpo físico e iluminando tu instinto más profundo.", mantra: "Mudo mi piel para renacer. Mi estructura sana y la sabiduría ancestral asciende en mí." },
            { name: "BÚHO (MIQUIZTLI)", culture: "Azteca", skill: "Transmutación y Cierre de Ciclos.", color: "#4B0082", hardware: "Nivel aéreo / Vuelo superior silencioso.", analysis: "La capacidad de ver en la oscuridad de las crisis. Te otorga el poder de soltar sin apegos: dejar morir hábitos, objetos, relaciones o proyectos que ya no vibran contigo, abriendo espacio para la nueva creación.", boot: "Inhala profundo y, al exhalar, visualiza cómo lo estancado y lo obsoleto se vuelve polvo luminoso, disolviéndose en el viento nocturno. Siente el inmenso poder de soltar.", mantra: "Dejo morir lo que ya no sirve. Transmuto el final en el principio de mi nueva creación." },
            { name: "URO (TORO SALVAJE)", culture: "Nórdica", skill: "Fuerza Bruta y Vitalidad Imparable.", color: "#A52A2A", hardware: "Masa muscular / Piernas y torso.", analysis: "La fuerza primigenia de la naturaleza. Se activa cuando necesitas superar el dolor físico, escalar la montaña, sacar el vehículo del barro o empujar tu cuerpo más allá de sus límites aparentes.", boot: "Tensa todos los músculos de tu cuerpo durante dos segundos y luego relaja. Siente el peso de tus pies descalzos anclados en la tierra, inamovibles, cargados de una vitalidad salvaje.", mantra: "Potencia imparable. Resistencia vital absoluta. Nada detiene mi paso." },
            { name: "LAGARTO", culture: "Aborigen Australiana", skill: "Arquitecto del Dreamtime (Nahualismo).", color: "#FF8C00", hardware: "Boca / Lengua y paladar.", analysis: "El maestro del tiempo no lineal. Sabe que la realidad física es moldeable desde el interior. Especialista en la meditación profunda, los sueños lúcidos y la manifestación de deseos en el plano material.", boot: "Pega la lengua suavemente al paladar. Quédate inmóvil bajo tu propio sol interno. Siente cómo el aire y la materia a tu alrededor se vuelven líquidos y maleables, respondiendo a tu intención.", mantra: "El mundo es maleable. Despierto en el sueño y moldeo mi propia realidad." },
            { name: "SABUESO ESTELAR", culture: "Griega", skill: "Antena Cósmica e Inspiración Divina.", color: "#1E90FF", hardware: "Antenas (Laterales superiores de la frente).", analysis: "La chispa de la genialidad. Conexión directa con la intuición cósmica para canalizar ideas de arte, nuevos modelos de negocio, viajes y visiones que rompen el molde del tiempo presente.", boot: "Enfoca tu atención en la parte alta de tu frente. Visualiza dos hilos de luz azul eléctrico disparándose hacia las estrellas, abriendo un canal de recepción directa con la fuente creadora.", mantra: "Antenas encendidas. Recibo la genialidad cósmica. La gran idea desciende ahora." },
            { name: "LEOPARDO (OGUN)", culture: "Yoruba", skill: "Maestría de la Herramienta y el Arte.", color: "#DAA520", hardware: "Manos / Dedos y falanges.", analysis: "El virtuosismo del creador en acción. Convierte tus manos en extensiones exactas de tu voluntad, ya sea para preparar un alimento perfecto, conducir un vehículo con precisión absoluta o esculpir una nueva creación.", boot: "Frota tus manos y enfoca la energía en las palmas. Visualiza chispas doradas en la punta de tus dedos. Siente cómo el objeto, el ingrediente o la herramienta se funde con tu intención.", mantra: "Maestría absoluta. El instrumento y yo somos un solo flujo de creación." },
            { name: "SAMURAI JABALÍ", culture: "Japonesa", skill: "Carga Frontal y Decisión Indomable.", color: "#B22222", hardware: "Centro de Gravedad / Abdomen inferior (Hara).", analysis: "La erradicación de la pereza y la duda. Rompe bloqueos y la parálisis por análisis. Se activa para iniciar trámites complejos, arrancar nuevas empresas o tomar decisiones de vida definitivas sin mirar atrás.", boot: "Aprieta ligeramente los músculos del abdomen bajo. Fija la mirada en tu objetivo. Visualiza un vector de fuego rojo proyectándose directamente hacia la meta, arrasando con la resistencia.", mantra: "Decisión total. El miedo y la duda se derrumban ante mi voluntad frontal." },
            { name: "PUMA", culture: "Inca", skill: "Liderazgo Táctico y Conexión Terrenal (Kay Pacha).", color: "#CD853F", hardware: "Corazón y Músculos motores (Piernas).", analysis: "El administrador firme y elegante de la tierra. Te da la templanza para liderar proyectos, negociar, organizar tus finanzas y gestionar tu impacto en el mundo físico pisando fuerte y con autoridad tranquila.", boot: "Levanta el pecho y corrige tu postura física. Respira con lentitud y profundidad. Absorbe la fuerza del suelo que pisas. Asume la autoridad natural del que lidera su propio imperio terrenal.", mantra: "Domino el Kay Pacha. Lidero mi vida y mi entorno con gracia, firmeza y estrategia." },
            { name: "PULPO (HE'E)", culture: "Polinesia", skill: "Atención Multifocal y Flexibilidad.", color: "#9370DB", hardware: "Sexto sentido táctil en las manos / Sistema nervioso extendido.", analysis: "La capacidad de sostener múltiples universos a la vez sin colapsar. Equilibra tus viajes, tus relaciones, tu salud, tus colecciones y tus proyectos empresariales, dándole a cada uno la atención fluida e inteligente que requiere.", boot: "Abre y cierra las manos soltando el control rígido. Visualiza ocho corrientes de luz púrpura extendiéndose y adaptándose suavemente a cada área de tu vida, manteniendo todo en perfecto equilibrio.", mantra: "Fluidez total. Abrazo y sostengo todas las dimensiones de mi vida en perfecta paz." },
            { name: "LAMASSU", culture: "Mesopotamia", skill: "Cimiento Inquebrantable de la Razón.", color: "#F0E68C", hardware: "Hombros / Pies (Base de soporte absoluto).", analysis: "El búnker del imperio personal. Te otorga la claridad lógica, financiera y legal para establecer las bases de tus empresas y tu vida formal. Es la estabilidad que te permite construir tan alto como quieras sin temor a caer.", boot: "Deja caer el peso muerto de tus hombros. Visualiza cuatro inmensos pilares dorados de razón y orden anclándote al centro de la tierra. Siente cómo tu estructura soporta cualquier peso.", mantra: "Mis bases son de oro puro. Mi mente es un imperio inamovible de claridad." },
            { name: "SEMARGL", culture: "Eslava", skill: "Purificación Ambiental y Fuego Sagrado.", color: "#FF2400", hardware: "Aura / Campo magnético a 5cm de tu piel.", analysis: "El humo del palo santo y la limpieza del aura. Se activa para transmutar energías ambientales densas, envidias, accidentes energéticos o discusiones, devolviendo el equilibrio a tu habitación, a tu altar y a tu campo áurico.", boot: "Siente la temperatura de tu piel. Visualiza un aura de llamas rojas y translúcidas rodeándote por completo. Observa cómo todo el estrés y la carga del mundo externo se vuelven cenizas al tocar tu perímetro.", mantra: "Mi fuego transmuta toda densidad. Mi entorno respira limpio; la energía divina fluye." },
            { name: "LEÓN NIEVES (SENGGE)", culture: "Tibetana", skill: "Ecuanimidad Brillante", color: "#F0F8FF", hardware: "Garganta / Cerebelo (Base del cráneo).", analysis: "La maestría de vivir sin miedo al fracaso. Reconocer que explorar el mundo, amar, cocinar, programar y coleccionar no son obligaciones, sino la forma en que el universo juega y se divierte a través de ti.", boot: "Esboza una genuina sonrisa física. Libera por completo la tensión del cuello y la mandíbula. Siente una luz blanca, juguetona y brillante disolviendo la 'seriedad' de la vida y llenándote de libertad total.", mantra: "La vida es mi terreno de juego. Creo, exploro y existo desde la más pura y alegre libertad." }
        ];

        let scene, camera, renderer, labelRenderer, controls, raycaster, mouse;
        let nodes = [], targetableObjects = [];
        let isAutoRotating = true;
        let activeLayerGroups = [];
        let currentSkinIndex = -1;
        let currentUtterance = null; // Variable global para proteger TTS en Android WebView

        // Aislamiento seguro del pre-calentamiento TTS mediante Macrotarea
        setTimeout(() => {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
                }
            } catch(e) { console.warn("TTS Pre-warmer Ignored", e); }
        }, 1000);

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
            camera.position.set(0, 40, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            labelRenderer = new THREE.CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            scene.add(new THREE.AmbientLight(0x444444));
            const sun = new THREE.PointLight(0xffffff, 3, 1000);
            sun.position.set(50, 50, 50);
            scene.add(sun);

            createParticleLayer('cube', 90, 3500, 0xffffff, 0.0005, 0.4); 
            createParticleLayer('sphere', 260, 1600, 0x9370DB, 0.0003, 1.5); 
            createParticleLayer('rhombus', 1040, 2600, 0xffffff, 0.0002, 1.5); 

            const chawpi = new THREE.Mesh(new THREE.IcosahedronGeometry(3, 1), new THREE.MeshPhongMaterial({color: 0x00f3ff, wireframe: true}));
            scene.add(chawpi);

            const list = document.getElementById('skin-list');
            SKINS.forEach((skin, i) => {
                const angle = (i / 18) * Math.PI * 2;
                const r = 40; 
                const nodeGroup = new THREE.Group();
                const mesh = new THREE.Mesh(
                    new THREE.OctahedronGeometry(1.5, 0),
                    new THREE.MeshPhongMaterial({ color: skin.color, emissive: skin.color, emissiveIntensity: 0.6, flatShading: true })
                );
                nodeGroup.add(mesh);
                targetableObjects.push(mesh); 

                const nodePos = new THREE.Vector3(Math.cos(angle)*r, (Math.random()-0.5)*15, Math.sin(angle)*r);
                const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), nodePos]);
                const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({color: 0x444444, transparent: true, opacity: 0.45}));
                scene.add(line);

                const div = document.createElement('div');
                div.className = 'label-3d';
                div.textContent = skin.name.split(' ')[0];
                div.onclick = () => focusSkin(i);
                const label = new THREE.CSS2DObject(div);
                label.position.set(0, 4, 0); 
                nodeGroup.add(label);

                nodeGroup.position.copy(nodePos);
                scene.add(nodeGroup);
                nodes.push({ group: nodeGroup, mesh: mesh, data: skin, line: line, labelDiv: div });

                const item = document.createElement('div');
                item.className = 'skin-item';
                item.innerHTML = `<span style="color:${skin.color}">■</span> ${skin.name}`;
                item.onclick = () => focusSkin(i);
                list.appendChild(item);
            });

            window.addEventListener('resize', onResize);
            renderer.domElement.addEventListener('click', onI3DClick);
            renderer.domElement.addEventListener('touchstart', onI3DClick);

            setTimeout(() => {
                gsap.to("#preloader", { opacity: 0, duration: 1.5, onComplete: () => document.getElementById("preloader").style.display = "none" });
            }, 2500);

            animate();
        }

        function createParticleLayer(type, size, count, color, rotSpeed, pointSize = 1.5) {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<count; i++) {
                let x, y, z;
                if(type === 'cube') {
                    x = (Math.random()-0.5)*size*2; y = (Math.random()-0.5)*size*2; z = (Math.random()-0.5)*size*2;
                } else if(type === 'sphere') {
                    const u = Math.random(); const v = Math.random();
                    const theta = 2 * Math.PI * u; const phi = Math.acos(2 * v - 1);
                    x = size * Math.sin(phi) * Math.cos(theta); y = size * Math.sin(phi) * Math.sin(theta); z = size * Math.cos(phi);
                } else {
                    const u = Math.random()*2-1; const v = Math.random()*2-1; const w = Math.random()*2-1;
                    const norm = Math.abs(u) + Math.abs(v) + Math.abs(w);
                    x = (u/norm)*size; y = (v/norm)*size; z = (w/norm)*size;
                }
                pos.push(x, y, z);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const points = new THREE.Points(geo, new THREE.PointsMaterial({color: color, size: pointSize, transparent: true, opacity: 0.7}));
            const group = new THREE.Group();
            group.add(points);
            group.userData.rotSpeed = rotSpeed;
            scene.add(group);
            activeLayerGroups.push(group);
        }

        function onI3DClick(event) {
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(targetableObjects);
            if (intersects.length > 0) {
                const clickedMesh = intersects[0].object;
                const index = nodes.findIndex(n => n.mesh === clickedMesh);
                if (index !== -1) focusSkin(index);
            }
        }

        function navigateSkins(step) {
            let nextIndex = currentSkinIndex + step;
            if (nextIndex >= SKINS.length) nextIndex = 0;
            if (nextIndex < 0) nextIndex = SKINS.length - 1;
            focusSkin(nextIndex);
        }

        function toggleSpeech() {
            if (currentSkinIndex === -1) return;
            const btn = document.getElementById('tts-btn');

            if (!('speechSynthesis' in window)) {
                btn.innerHTML = '>[ERROR] MOTOR DE VOZ NO DETECTADO';
                return;
            }

            const synth = window.speechSynthesis;
            
            try {
                if (synth.speaking) {
                    synth.cancel();
                    btn.innerHTML = '&#9658; INICIAR REPRODUCCIÓN';
                } else {
                    const skin = SKINS[currentSkinIndex];
                    const textToRead = `Secuencia de activación para ${skin.name}. Cultura base: ${skin.culture}. Habilidad principal: ${skin.skill}. Punto de enfoque físico: ${skin.hardware}. Análisis táctico: ${skin.analysis} Instrucción de Booteo: ${skin.boot} Mantra de ejecución: ${skin.mantra}`;
                    
                    currentUtterance = new SpeechSynthesisUtterance(textToRead);
                    currentUtterance.lang = 'es-ES';
                    currentUtterance.rate = 0.85; 
                    currentUtterance.pitch = 0.6; 

                    const voices = synth.getVoices();
                    const esVoices = voices.filter(v => v.lang.startsWith('es'));
                    const preferredVoice = esVoices.find(v => v.name.toLowerCase().includes('male') || v.name.includes('Google')) || esVoices[0];
                    if (preferredVoice) {
                        currentUtterance.voice = preferredVoice;
                    }
                    
                    currentUtterance.onend = () => { btn.innerHTML = '&#9658; INICIAR REPRODUCCIÓN'; };
                    currentUtterance.onerror = (e) => { console.warn("TTS Error:", e); btn.innerHTML = '&#9658; INICIAR REPRODUCCIÓN'; };
                    
                    synth.speak(currentUtterance);
                    btn.innerHTML = '&#9632; DETENER REPRODUCCIÓN';
                }
            } catch(e) {
                console.error("Fallo crítico en TTS:", e);
            }
        }

        function focusSkin(index) {
            isAutoRotating = false;
            currentSkinIndex = index;
            const target = nodes[index];
            const isMobile = window.innerWidth < 768;

            // 1. Ejecutar Lógica Visual de UI inmediatamente
            if(isMobile) document.getElementById('sidebar').classList.remove('active');

            nodes.forEach((n, i) => {
                const isTarget = (i === index);
                n.group.visible = isTarget; 
                if(n.line) n.line.visible = isTarget; 
                if(n.labelDiv) {
                    n.labelDiv.style.opacity = isTarget ? '1' : '0';
                    n.labelDiv.style.pointerEvents = isTarget ? 'auto' : 'none';
                }
            });

            // 2. Ejecutar Motores de Cámara (GSAP)
            const targetWorldPos = new THREE.Vector3();
            target.group.getWorldPosition(targetWorldPos);
            
            gsap.to(controls.target, { x: targetWorldPos.x, y: targetWorldPos.y, z: targetWorldPos.z, duration: 1.5, ease: "power2.inOut", onUpdate: () => controls.update() });
            
            const offsetDist = isMobile ? 18 : 12; 
            const direction = targetWorldPos.clone().normalize(); 
            const cameraPos = targetWorldPos.clone().add(direction.multiplyScalar(offsetDist));
            cameraPos.y += 2; 

            gsap.to(camera.position, { x: cameraPos.x, y: cameraPos.y, z: cameraPos.z, duration: 1.5, ease: "power2.inOut" });

            document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.skin-item')[index].classList.add('active');
            
            document.getElementById('node-name').innerText = target.data.name;
            document.getElementById('node-culture').innerText = target.data.culture;
            document.getElementById('node-skill').innerText = target.data.skill;
            
            const descHtml = `
                <div style="margin-bottom: 10px;"><span style="color: var(--neon-orange); font-size: 9px;">>_HARDWARE_TARGET:</span> <span style="color: #fff;">${target.data.hardware}</span></div>
                <div style="margin-bottom: 10px;"><span style="color: var(--neon-orange); font-size: 9px;">>_ANÁLISIS:</span> <span style="color: #ccc;">${target.data.analysis}</span></div>
                <div style="margin-bottom: 10px;"><span style="color: var(--neon-orange); font-size: 9px;">>_BOOT_SEQ:</span> <span style="color: #ccc;">${target.data.boot}</span></div>
                <div style="margin-top: 15px; padding-left: 10px; border-left: 2px solid var(--neon-blue); font-style: italic; color: #00f3ff;">"${target.data.mantra}"</div>
            `;
            document.getElementById('node-desc').innerHTML = descHtml;
            document.getElementById('detail-panel').classList.add('visible');

            // 3. BLINDAJE EXTREMO: Desacoplar la cancelación del TTS del hilo principal UI mediante Macrotarea
            setTimeout(() => {
                try {
                    if ('speechSynthesis' in window && window.speechSynthesis.speaking) {
                        window.speechSynthesis.cancel();
                    }
                    const btn = document.getElementById('tts-btn');
                    if (btn) btn.innerHTML = '&#9658; INICIAR REPRODUCCIÓN';
                } catch(e) {
                    console.warn("TTS Mute Error Ignored", e);
                }
            }, 10);
        }

        function resetView() {
            // Blindaje Try-Catch mediante Macrotarea
            setTimeout(() => {
                try {
                    if ('speechSynthesis' in window && window.speechSynthesis.speaking) {
                        window.speechSynthesis.cancel();
                    }
                    const btn = document.getElementById('tts-btn');
                    if (btn) btn.innerHTML = '&#9658; INICIAR REPRODUCCIÓN';
                } catch(e) {}
            }, 10);

            isAutoRotating = true;
            currentSkinIndex = -1;
            document.getElementById('detail-panel').classList.remove('visible');
            document.querySelectorAll('.skin-item').forEach(el => el.classList.remove('active'));
            
            nodes.forEach(n => {
                n.group.visible = true;
                if (n.line) n.line.visible = true;
                if (n.labelDiv) { n.labelDiv.style.opacity = '1'; n.labelDiv.style.pointerEvents = 'auto'; }
            });

            gsap.to(controls.target, { x: 0, y: 0, z: 0, duration: 1.5 });
            gsap.to(camera.position, { x: 0, y: 40, z: 120, duration: 1.5 });
        }

        function toggleIndex() {
            const s = document.getElementById('sidebar');
            window.innerWidth < 768 ? s.classList.toggle('active') : s.classList.toggle('hidden');
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            if(isAutoRotating) scene.rotation.y += 0.0003;
            activeLayerGroups.forEach((group, i) => {
                group.rotation.y += group.userData.rotSpeed;
                group.rotation.x = Math.sin(time * 0.05 + i) * 0.03; 
            });
            nodes.forEach(n => n.group.children[0].rotation.y += 0.004);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
